<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG QA System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #f9fafb;
            color: #111827;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        .container {
            width: 100%;
            max-width: 640px;
            background-color: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 2.5rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #111827;
            margin-bottom: 0.25rem;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 0.875rem;
            color: #4b5563;
            margin-bottom: 2rem;
        }

        .input-group {
            margin-bottom: 1.25rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 0.875rem 1rem;
            background-color: #ffffff;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            color: #111827;
            font-size: 0.95rem;
            font-family: inherit;
            transition: border-color 0.15s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #111827;
        }

        button {
            width: 100%;
            padding: 0.875rem;
            background-color: #111827;
            border: 1px solid #111827;
            border-radius: 6px;
            color: #ffffff;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.15s ease, border-color 0.15s ease;
        }

        button:hover {
            background-color: #1f2937;
            border-color: #1f2937;
        }

        button:active {
            background-color: #374151;
            border-color: #374151;
        }

        .loader {
            display: none;
            margin: 1.5rem auto;
            border: 2px solid #f3f4f6;
            border-left-color: #111827;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 0.8s linear infinite;
        }

        .result-box {
            display: none;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e5e7eb;
        }

        .result-section {
            margin-bottom: 1.5rem;
        }

        .result-title {
            font-size: 0.8125rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #4b5563;
            margin-bottom: 0.5rem;
        }

        .answer-text {
            font-size: 0.95rem;
            line-height: 1.5;
            color: #1f2937;
            white-space: pre-line;
        }

        .sources-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.375rem;
        }

        .source-tag {
            background-color: #f3f4f6;
            border: 1px solid #e5e7eb;
            color: #374151;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .source-tag.none {
            background-color: #fef2f2;
            border-color: #fee2e2;
            color: #ef4444;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Document QA Engine</h1>
        <div class="subtitle">Enter a query to retrieve answers from the local registry database.</div>
        
        <div class="input-group">
            <input type="text" id="question-input" placeholder="What would you like to ask?" autocomplete="off">
        </div>
        
        <button onclick="askQuestion()">Ask Document</button>
        
        <div class="loader" id="loader"></div>
        
        <div class="result-box" id="result-box">
            <div class="result-section">
                <div class="result-title">Response</div>
                <div class="answer-text" id="answer-output"></div>
            </div>
            
            <div class="result-section" style="margin-bottom: 0;">
                <div class="result-title">Sources Cited</div>
                <div class="sources-list" id="sources-output"></div>
            </div>
        </div>
    </div>

    <script>
        async function askQuestion() {
            const input = document.getElementById("question-input");
            const question = input.value.trim();
            if (!question) return;

            const loader = document.getElementById("loader");
            const resultBox = document.getElementById("result-box");
            const answerOutput = document.getElementById("answer-output");
            const sourcesOutput = document.getElementById("sources-output");

            loader.style.display = "block";
            resultBox.style.display = "none";
            answerOutput.innerText = "";
            sourcesOutput.innerHTML = "";

            try {
                const response = await fetch("/ask", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ question: question })
                });

                if (!response.ok) {
                    throw new Error("Failed to get answer from server");
                }

                const data = await response.json();
                answerOutput.innerText = data.answer;
                
                if (data.sources && data.sources.length > 0) {
                    data.sources.forEach(source => {
                        const tag = document.createElement("span");
                        tag.className = "source-tag";
                        tag.innerText = source;
                        sourcesOutput.appendChild(tag);
                    });
                } else {
                    const tag = document.createElement("span");
                    tag.className = "source-tag none";
                    tag.innerText = "No sources cited";
                    sourcesOutput.appendChild(tag);
                }

                resultBox.style.display = "block";
            } catch (error) {
                alert("Error: " + error.message);
            } finally {
                loader.style.display = "none";
            }
        }

        document.getElementById("question-input").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                askQuestion();
            }
        });
    </script>
</body>
</html>
